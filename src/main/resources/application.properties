spring.application.name=ChatBotProject

# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:chatbot.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# SQLite Connection Pool Optimization for Long-Running Operations
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=120000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-init-sql=PRAGMA busy_timeout=60000; PRAGMA journal_mode=WAL;

# JPA and Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Disable open-in-view to prevent transaction holding connections
spring.jpa.open-in-view=false

# Spring AI Configuration for Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=qwen3:14b
spring.ai.ollama.embedding.options.model=qwen3:14b
spring.ai.ollama.chat.options.think=false
