<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            height: 90vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5em;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-back {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.5);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            display: flex;
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.ai {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            position: relative;
        }

        .message.user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .message-bubble {
            background: #e0e0e0;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85em;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .message.ai .message-header {
            color: #888;
        }

        .message.user .message-header {
            color: rgba(255, 255, 255, 0.8);
        }

        .message-time {
            font-size: 0.75em;
        }

        .message-edited {
            font-size: 0.75em;
            font-style: italic;
        }

        .message.ai .edit-form {
            display: none;
            margin-top: 8px;
        }

        .message.ai.editing .message-content {
            display: none;
        }

        .message.ai.editing .edit-form {
            display: block;
        }

        .edit-form textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #999;
            border-radius: 4px;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
        }

        .edit-form-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-save {
            flex: 1;
            padding: 8px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-save:hover {
            background: #218838;
        }

        .btn-cancel {
            flex: 1;
            padding: 8px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .btn-cancel:hover {
            background: #5a6268;
        }

        .message-actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .btn-edit {
            padding: 6px 12px;
            background: #ffc107;
            color: black;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            transition: background 0.3s;
        }

        .btn-edit:hover {
            background: #e0a800;
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .input-area form {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-area button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #5568d3;
        }

        .input-area button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 th:text="${chat.title}">Chat Title</h1>
            <div class="header-actions">
                <a href="/" class="btn-back">← Back to Chats</a>
            </div>
        </div>

        <!-- Messages Container -->
        <div class="messages-container">
            <div th:if="${!messages.isEmpty()}">
                <div class="message" th:each="msg : ${messages}"
                     th:classappend="${msg.role.name() == 'USER' ? 'user' : 'ai'}"
                     th:id="'message-' + ${msg.id}">
                    <div class="message-bubble">
                        <!-- Message Header (Role and Time) -->
                        <div class="message-header">
                            <span th:text="${msg.role.name()}">USER/AI</span>
                            <span class="message-time" th:text="${#temporals.format(msg.timestamp, 'HH:mm')}">Time</span>
                            <span class="message-edited" th:if="${msg.edited}"> (edited)</span>
                        </div>

                        <!-- Message Content -->
                        <div class="message-content" th:text="${msg.content}">Message content</div>

                        <!-- Edit Form (AI messages only) -->
                        <div class="edit-form" th:if="${msg.role.name() == 'AI'}">
                            <form method="POST" th:action="'/message/' + ${msg.id} + '/edit'" style="display: contents;">
                                <textarea name="newContent" th:text="${msg.content}" required></textarea>
                                <div class="edit-form-buttons">
                                    <button type="submit" class="btn-save">Save</button>
                                    <button type="button" class="btn-cancel" onclick="cancelEdit(this)">Cancel</button>
                                </div>
                            </form>
                        </div>

                        <!-- Edit Button (AI messages only) -->
                        <div class="message-actions" th:if="${msg.role.name() == 'AI'}">
                            <button type="button" class="btn-edit" onclick="toggleEdit(this)">Edit</button>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${messages.isEmpty()}" style="text-align: center; padding: 40px; color: #888;">
                <p>No messages yet. Start the conversation!</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <form method="POST" th:action="'/chat/' + ${chat.id} + '/send'">
                <input type="text" name="content" placeholder="Type your message..." required autocomplete="off">
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <script>
        function toggleEdit(button) {
            const message = button.closest('.message');
            message.classList.toggle('editing');
        }

        function cancelEdit(button) {
            const message = button.closest('.message');
            message.classList.remove('editing');
        }

        // Auto-scroll to bottom when new messages arrive
        const messagesContainer = document.querySelector('.messages-container');
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    </script>
</body>
</html>
